name: ghostlight_portal_editor
description: "A new Flutter project."
publish_to: 'none'
version: 0.1.0+1

environment:
  sdk: ^3.12.2

dependencies:
  flutter:
    sdk: flutter
  mongo_dart: ^0.10.0
  bcrypt: ^1.1.3
  flutter_secure_storage: ^9.2.0
  flutter_inappwebview: ^6.1.5
  file_picker: ^8.1.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.14.0

flutter:
  uses-material-design: true

dependency_overrides:
  path_provider_android: '>=2.0.0 <2.3.0'

flutter_icons:
  android: "ic_launcher"
  ios: false
  image_path: "assets/icon.png"
  min_sdk_android: 21
  windows:
    generate: true
    image_path: "assets/icon.png"
    icon_size: 48
  linux:
    generate: true
    image_path: "assets/icon.png"
